<svg xmlns="http://www.w3.org/2000/svg" width="360" height="404" viewBox="0 0 360 404" fill="none">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="0.5" y="0.5" width="359" height="403" rx="15.5" fill="white" stroke="#E5E7EB" filter="url(#drop-shadow)"/>

  <!-- Header label -->
  <text x="16" y="36" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="700" letter-spacing="1.6" fill="#9CA3AF">SWITCH WORKSPACE</text>

  <!-- ─── Row 1: Home | Publishers (active) | Ads ─── -->

  <!-- Home cell -->
  <rect x="12" y="48" width="108" height="112" rx="12" fill="transparent"/>
  <rect x="38" y="64" width="56" height="56" rx="12" fill="#F3F4F6"/>
  <!-- Home icon (20×20 centered in 56×56 → offset 18px → origin 56, 82) scale 20/24 -->
  <g transform="translate(56,82) scale(0.833)" stroke="#6B7280" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 11 12 4l9 7"/>
    <path d="M5 10v9h14v-9"/>
    <path d="M10 19v-5h4v5"/>
  </g>
  <text x="66" y="134" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="500" fill="#4B5563">Home</text>

  <!-- Publishers cell (ACTIVE) -->
  <rect x="126" y="48" width="108" height="112" rx="12" fill="#F5F3FF"/>
  <rect x="152" y="64" width="56" height="56" rx="12" fill="#7C3AED"/>
  <!-- Mic icon (white, 20×20 centered → origin 170, 82) -->
  <g transform="translate(170,82) scale(0.833)" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="9" y="3" width="6" height="11" rx="3" stroke="white" fill="none"/>
    <path d="M5 11a7 7 0 0 0 14 0"/>
    <path d="M12 18v3"/>
  </g>
  <text x="180" y="134" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="700" fill="#6D28D9">Publishers</text>

  <!-- Ads cell -->
  <rect x="240" y="48" width="108" height="112" rx="12" fill="transparent"/>
  <rect x="266" y="64" width="56" height="56" rx="12" fill="#F3F4F6"/>
  <!-- Tag icon (20×20 centered → origin 284, 82) -->
  <g transform="translate(284,82) scale(0.833)" stroke="#6B7280" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 7h11l5 5-5 5H4z"/>
  </g>
  <text x="294" y="134" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="500" fill="#4B5563">Ads</text>

  <!-- ─── Row 2: Settings | Accounting | Reports ─── -->

  <!-- Settings cell -->
  <rect x="12" y="164" width="108" height="112" rx="12" fill="transparent"/>
  <rect x="38" y="180" width="56" height="56" rx="12" fill="#F3F4F6"/>
  <!-- Gear icon (20×20 → origin 56, 198) -->
  <g transform="translate(56,198) scale(0.833)" stroke="#6B7280" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1A2 2 0 1 1 4.4 17l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1A2 2 0 1 1 7 4.4l.1.1a1.7 1.7 0 0 0 1.8.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1A2 2 0 1 1 19.6 7l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/>
  </g>
  <text x="66" y="250" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="500" fill="#4B5563">Settings</text>

  <!-- Accounting cell -->
  <rect x="126" y="164" width="108" height="112" rx="12" fill="transparent"/>
  <rect x="152" y="180" width="56" height="56" rx="12" fill="#F3F4F6"/>
  <!-- Card icon (20×20 → origin 170, 198) -->
  <g transform="translate(170,198) scale(0.833)" stroke="#6B7280" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="6" width="18" height="13" rx="2" fill="none" stroke="#6B7280"/>
    <path d="M3 10h18M7 15h4"/>
  </g>
  <text x="180" y="250" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="500" fill="#4B5563">Accounting</text>

  <!-- Reports cell -->
  <rect x="240" y="164" width="108" height="112" rx="12" fill="transparent"/>
  <rect x="266" y="180" width="56" height="56" rx="12" fill="#F3F4F6"/>
  <!-- Bar chart icon (20×20 → origin 284, 198) -->
  <g transform="translate(284,198) scale(0.833)" stroke="#6B7280" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 19V5M4 19h16M8 16v-4M12 16V9M16 16v-6"/>
  </g>
  <text x="294" y="250" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="500" fill="#4B5563">Reports</text>

  <!-- ─── Row 3: User Management ─── -->

  <!-- User Management cell -->
  <rect x="12" y="280" width="108" height="112" rx="12" fill="transparent"/>
  <rect x="38" y="296" width="56" height="56" rx="12" fill="#F3F4F6"/>
  <!-- Users icon (20×20 → origin 56, 314) -->
  <g transform="translate(56,314) scale(0.833)" stroke="#6B7280" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="9" cy="9" r="3.2"/>
    <path d="M3 19c.8-3 3.2-4.5 6-4.5s5.2 1.5 6 4.5"/>
    <circle cx="17" cy="7" r="2.2"/>
    <path d="M15 13c2.5 0 4.2 1.2 5 3"/>
  </g>
  <text x="66" y="362" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="500" fill="#4B5563">User Management</text>
</svg>
